<!DOCTYPE html>
<html lang="en">

    <title>SwapAggregator · Modular CSS</title>

<body>
<div class="app-container">

    <div class="header-modern">
        <div class="title-group">
            <div class="logo-title">
                <img src="icons/mixxchange.webp" alt="Mixxchange" class="title-logo">
                <h1>Swap-Aggregator</h1>
            </div>
            <span class="version-badge">v1.5</span>
        </div>
        <div class="exchanges-note">
            ⚡ Search among the best exchanges already tested and selected by us
        </div>
    </div>

    <div class="swap-panel">
        <!-- Two‑pill layout with grid for perfect centering -->
        <div class="row grid-row">
            <div class="col">
                <label class="label">You send</label>
                <div class="pill">
                    <input type="number" id="amountFrom" value="0.01" step="any" placeholder="Amount" class="pill-input">
                    <select id="currencyFrom" class="pill-select"></select>
                </div>
            </div>

            <div class="swap-arrow" id="swapArrow" title="Swap currencies">⇅</div>

            <div class="col">
                <label class="label">You receive</label>
                <div class="pill">
                    <input type="number" id="amountTo" placeholder="Estimate" readonly class="pill-input pill-input-readonly">
                    <select id="currencyTo" class="pill-select"></select>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button id="refreshRatesBtn" class="btn">🔍 Find best rates</button>
        </div>

        <!-- Best rate box removed as requested -->

        <div class="providers-title">
            <span>📊 Provider comparison</span>🟢Never KYC ·🟡KYC only in rare cases ·⚡Fast
            <span style="font-size:1.2rem; color:#6088a3;">Click to → swap</span>
        </div>

        <div class="providers" id="providerContainer">
            <!-- Cards will be dynamically generated -->
        </div>
    </div>

    <div class="footer-note">
        ✅ MiXXChange © SwapAggregator All rights reserved.2023-2026</span><br>
        ⚙️ Find with us the best <code class="inline-code">Swaps and Rates</code> Thank You..
    </div>
</div>

<script>
    const BACKEND_URL = 'https://swap-aggregator-backend.onrender.com';
  

    const exchangeConfig = [
        { id: 'pegasus', name: 'PegasusSwap', emoji: '🟢⚡', icon: 'icons/pegasus.webp', link: 'https://pegasusswap.com/?ref=B7J4583', fetchFunc: fetchPegasusRate, enabled: true },
        { id: 'exolix', name: 'Exolix', emoji: '🟢', icon: 'icons/exolix.webp', link: 'https://exolix.com?ref=6A565BE6BD12206BD8289DF3541ECC38', fetchFunc: fetchExolixRate, enabled: true },
        { id: 'fixedfloat', name: 'FixedFloat', emoji: '🟡⚡⚡', icon: 'icons/fixedfloat.webp', link: 'https://ff.io/?ref=myyf98ad', fetchFunc: fetchFixedFloatRate, enabled: true },
        { id: 'etz', name: 'ETZ', emoji: '🟢⚡', icon: 'icons/etz.webp', link: 'https://etz-swap.com?ref=IL95CHDCNI7DUSWECCBX', fetchFunc: fetchETZRate, enabled: true },
        { id: 'swapuz', name: 'Swapuz', emoji: '🟡⚡', icon: 'icons/swapuz.webp', link: 'https://swapuz.com/?ref=6b44f279-f1b4-4f77-b167-ae1099fec0e4', fetchFunc: fetchSwapuzRate, enabled: true },
        { id: 'mixed', name: 'Mixed', emoji: '🟢', icon: 'icons/mixed.webp', link: 'https://mixed.exchange/?ref=nxrv33Upkz46', fetchFunc: fetchMixedRate, enabled: true },
        { id: 'xgram', name: 'Xgram', emoji: '🟡', icon: 'icons/xgram.webp', link: 'https://xgram.io?refId=6996f9b9e189f', fetchFunc: fetchXgramRate, enabled: true }
    ];

    const enabledExchanges = exchangeConfig.filter(ex => ex.enabled);

    function rebuildProviderCards() {
        const container = document.getElementById('providerContainer');
        container.innerHTML = '';
        enabledExchanges.forEach(ex => {
            const card = document.createElement('a');
            card.className = 'provider-card';
            card.id = `${ex.id}Card`;
            card.href = ex.link;
            card.target = '_blank';
            card.rel = 'noopener';
            card.innerHTML = `
                <span class="provider-name">
                    <img src="${ex.icon}" alt="${ex.name}" class="provider-icon">
                    ${ex.name}${ex.emoji}
                </span>
                <span class="provider-rate" id="${ex.id}Rate">—</span>
            `;
            container.appendChild(card);
        });
    }

    function setProviderRate(providerId, rateText, isError = false) {
        const span = document.getElementById(`${providerId}Rate`);
        if (span) {
            span.innerText = rateText;
            span.style.color = isError ? '#f28b82' : '#7cc5b5';
        }
    }

    function sortProviders() {
        const container = document.getElementById('providerContainer');
        const cards = Array.from(container.children);
        const rates = cards.map(card => {
            const rateSpan = card.querySelector('.provider-rate');
            const rateText = rateSpan.innerText;
            const rate = parseFloat(rateText);
            return { card, rate: isNaN(rate) ? -1 : rate };
        });
        rates.sort((a, b) => {
            if (a.rate === -1 && b.rate === -1) return 0;
            if (a.rate === -1) return 1;
            if (b.rate === -1) return -1;
            return b.rate - a.rate;
        });
        rates.forEach(item => container.appendChild(item.card));
    }

    // New function to highlight the best rate provider
    function highlightBestProvider() {
        // Remove highlight from all cards
        document.querySelectorAll('.provider-card').forEach(card => card.classList.remove('best-rate'));
        
        const firstCard = document.querySelector('.provider-card');
        if (!firstCard) return;
        
        const rateSpan = firstCard.querySelector('.provider-rate');
        if (!rateSpan) return;
        
        const rateText = rateSpan.innerText;
        // Only highlight if it's a valid number (not error, not loading)
        if (rateText !== '⏳' && !rateText.includes('❌') && rateText !== '—') {
            firstCard.classList.add('best-rate');
        }
    }

    async function fetchPegasusRate(fromVal, toVal, amount) {
        const from = parseCoinOption(fromVal);
        const to = parseCoinOption(toVal);
        let url = `${BACKEND_URL}/api/pegasus/rate?from=${from.ticker}&to=${to.ticker}&amount=${amount}`;
        if (from.network) url += `&networkFrom=${encodeURIComponent(from.network)}`;
        if (to.network) url += `&networkTo=${encodeURIComponent(to.network)}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.error) throw new Error(data.message);
            return { rate: data.receive, raw: data };
        } catch (e) {
            return { rate: null, error: e.message };
        }
    }
    async function fetchExolixRate(fromVal, toVal, amount) {
        const from = parseCoinOption(fromVal);
        const to = parseCoinOption(toVal);
        let url = `${BACKEND_URL}/api/exolix/rate?from=${from.ticker}&to=${to.ticker}&amount=${amount}`;
        if (from.network) url += `&networkFrom=${encodeURIComponent(from.network)}`;
        if (to.network) url += `&networkTo=${encodeURIComponent(to.network)}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.error) throw new Error(data.message);
            return { rate: data.toAmount, raw: data };
        } catch (e) {
            return { rate: null, error: e.message };
        }
    }
    async function fetchFixedFloatRate(fromVal, toVal, amount) {
        const from = parseCoinOption(fromVal);
        const to = parseCoinOption(toVal);
        const body = {
            fromCcy: from.ticker,
            toCcy: to.ticker,
            amount: parseFloat(amount)
        };
        try {
            const res = await fetch(`${BACKEND_URL}/api/fixedfloat/price`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.error) throw new Error(data.message);
            if (data.code === 0 && data.data && data.data.to) {
                return { rate: data.data.to.amount, raw: data };
            } else {
                throw new Error(data.msg || 'Unknown error');
            }
        } catch (e) {
            return { rate: null, error: e.message };
        }
    }
    async function fetchETZRate(fromVal, toVal, amount) {
        const from = parseCoinOption(fromVal);
        const to = parseCoinOption(toVal);
        let url = `${BACKEND_URL}/api/etz/rate?from=${from.ticker}&to=${to.ticker}&amount=${amount}&networkFrom=${encodeURIComponent(from.network)}&networkTo=${encodeURIComponent(to.network)}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.error) throw new Error(data.message);
            if (data.data && typeof data.data.amountTo !== 'undefined') {
                return { rate: data.data.amountTo, raw: data };
            } else {
                throw new Error('Unexpected response format');
            }
        } catch (e) {
            return { rate: null, error: e.message };
        }
    }
    async function fetchSwapuzRate(fromVal, toVal, amount) {
        const from = parseCoinOption(fromVal);
        const to = parseCoinOption(toVal);
        let url = `${BACKEND_URL}/api/swapuz/rate?from=${from.ticker}&to=${to.ticker}&amount=${amount}&networkFrom=${encodeURIComponent(from.network)}&networkTo=${encodeURIComponent(to.network)}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.error) throw new Error(data.message);
            if (data.result && typeof data.result.result !== 'undefined') {
                return { rate: data.result.result, raw: data };
            } else {
                throw new Error('Unexpected response format');
            }
        } catch (e) {
            return { rate: null, error: e.message };
        }
    }
    async function fetchMixedRate(fromVal, toVal, amount) {
        const from = parseCoinOption(fromVal);
        const to = parseCoinOption(toVal);
        let url = `${BACKEND_URL}/api/mixed/rate?from=${from.ticker}&to=${to.ticker}&amount=${amount}&networkFrom=${encodeURIComponent(from.network)}&networkTo=${encodeURIComponent(to.network)}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.error) throw new Error(data.message);
            if (typeof data.toAmount !== 'undefined') {
                return { rate: data.toAmount, raw: data };
            } else {
                throw new Error('Unexpected response format');
            }
        } catch (e) {
            return { rate: null, error: e.message };
        }
    }
    async function fetchXgramRate(fromVal, toVal, amount) {
        const from = parseCoinOption(fromVal);
        const to = parseCoinOption(toVal);
        let url = `${BACKEND_URL}/api/xgram/rate?from=${from.ticker}&to=${to.ticker}&amount=${amount}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.error) throw new Error(data.message);
            if (typeof data.toAmount !== 'undefined') {

            } else {
                throw new Error('Unexpected response format');
            }
        } catch (e) {
            return { rate: null, error: e.message };
        }
    }

    function populateSelect(selectId) {
        const select = document.getElementById(selectId);
        coinList.forEach(coin => {
            const option = document.createElement('option');
            option.value = `${coin.ticker}|${coin.network}`;
            option.textContent = coin.display;
            select.appendChild(option);
        });
    }
    populateSelect('currencyFrom');
    populateSelect('currencyTo');

    function setDefaultSelections() {
        const fromSelect = document.getElementById('currencyFrom');
        const toSelect = document.getElementById('currencyTo');
        for (let i = 0; i < fromSelect.options.length; i++) {
            if (fromSelect.options[i].value === 'BTC|BTC') {
                fromSelect.selectedIndex = i;
                break;
            }
        }
        for (let i = 0; i < toSelect.options.length; i++) {
            if (toSelect.options[i].value === 'XMR|XMR') {
                toSelect.selectedIndex = i;
                break;
            }
        }
    }
    setDefaultSelections();

    function parseCoinOption(value) {
        const [ticker, network] = value.split('|');
        return { ticker, network };
    }

    document.getElementById('swapArrow').addEventListener('click', () => {
        const fromSelect = document.getElementById('currencyFrom');
        const toSelect = document.getElementById('currencyTo');
        const fromVal = fromSelect.value;
        const toVal = toSelect.value;
        fromSelect.value = toVal;
        toSelect.value = fromVal;
    });

    async function fetchAllRates() {
        const fromVal = document.getElementById('currencyFrom').value;
        const toVal = document.getElementById('currencyTo').value;
        let amount = parseFloat(document.getElementById('amountFrom').value);
        if (isNaN(amount) || amount <= 0) amount = 0.01;

        const btn = document.getElementById('refreshRatesBtn');
        btn.classList.add('loading');
        btn.innerHTML = '⏳ Searching...';

        enabledExchanges.forEach(ex => {
            setProviderRate(ex.id, '⏳', false);
        });
        document.getElementById('amountTo').value = '';

        const fetchPromises = enabledExchanges.map(ex => ex.fetchFunc(fromVal, toVal, amount));
        const results = await Promise.allSettled(fetchPromises);

        let idx = 0;
        const rateObjects = [];
        enabledExchanges.forEach(ex => {
            const result = results[idx++];
            let rate = null, error = null;
            if (result.status === 'fulfilled' && result.value.rate !== null) {
                rate = result.value.rate;
            } else {
                error = result.status === 'rejected' ? result.reason : (result.value?.error || 'error');
            }
            setProviderRate(ex.id, rate ? rate.toFixed(6) : `❌ ${error}`, !rate);
            if (rate) rateObjects.push({ name: ex.name, rate });
        });

        sortProviders();

        if (rateObjects.length > 0) {
            const best = rateObjects.reduce((max, curr) => curr.rate > max.rate ? curr : max, rateObjects[0]);
            document.getElementById('amountTo').value = best.rate.toFixed(6);
        }

        // Highlight the best provider (first card after sort)
        highlightBestProvider();

        btn.classList.remove('loading');
        btn.innerHTML = '🔍 Find best rates';
    }

    window.onload = function() {
        rebuildProviderCards();
        document.getElementById('refreshRatesBtn').addEventListener('click', fetchAllRates);
        setTimeout(fetchAllRates, 100);
    };
</script>
